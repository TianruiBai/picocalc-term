# eUX OS Wi-Fi Configuration Template
#
# Copy this file to /data/etc/wifi/wpa_supplicant.conf
# and fill in your network credentials.
#
# Usage:
#   pcwifi connect <ssid> <password>
#   (auto-saves to /data/etc/wifi/wpa_supplicant.conf)

network={
    ssid="your_network"
    psk="your_password"
    key_mgmt=WPA-PSK
}
